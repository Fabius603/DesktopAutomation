name: Release (Windows self-contained)

on:
  push:
    branches:
      - master              # läuft bei jedem Push auf master
    paths:
      - 'DesktopAutomationApp/DesktopAutomationApp.csproj'   # nur wenn csproj geändert wurde
  workflow_dispatch:        # manuell im Actions-Tab startbar

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version aus der csproj lesen (z. B. "1.2.3" → Tag "v1.2.3")
      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "DesktopAutomationApp/DesktopAutomationApp.csproj"
          $version = $csproj.Project.PropertyGroup.Version | Select-Object -First 1
          "VERSION=$version"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=v$version"      | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Detected version: $version"

      # Prüfen ob für diesen Tag schon ein Release existiert → wenn ja, abbrechen
      - name: Check if release already exists
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.ver.outputs.TAG }}"
          $isManual = "${{ github.event_name }}" -eq "workflow_dispatch"

          if ($isManual) {
            Write-Host "Manual run detected - forcing release recreation for $tag."
            gh release view $tag 2>$null
            if ($LASTEXITCODE -eq 0) {
              gh release delete $tag --yes --cleanup-tag
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to delete existing release/tag $tag"
              }
              Write-Host "Deleted existing release and tag: $tag"
            } else {
              Write-Host "No existing release for $tag - creating a fresh one."
            }

            "EXISTS=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists – skipping."
            "EXISTS=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Release $tag not found – will create."
            "EXISTS=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          exit 0

      - name: Setup .NET
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        if: steps.check.outputs.EXISTS == 'false'
        run: dotnet restore

      # NUR das Startprojekt publishen (nicht die .sln)
      - name: Publish self-contained (win-x64)
        if: steps.check.outputs.EXISTS == 'false'
        run: >
          dotnet publish ./DesktopAutomationApp/DesktopAutomationApp.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o out/win-x64

      - name: Archive ZIP
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          powershell Compress-Archive -Path out/win-x64\* -DestinationPath DesktopAutomation-${{ steps.ver.outputs.TAG }}-win-x64.zip

      # Release anlegen (Tag wird von der Action automatisch erstellt)
      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          files: DesktopAutomation-${{ steps.ver.outputs.TAG }}-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bei manuellem Lauf/ohne Tag: ZIP als Build-Artifact hochladen
      - name: Upload artifact (manual/debug)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: DesktopAutomation-win-x64
          path: DesktopAutomation-${{ github.ref_name || 'manual' }}-win-x64.zip
