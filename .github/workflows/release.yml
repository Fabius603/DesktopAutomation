name: Release (Windows / Velopack)

on:
  push:
    branches:
      - master
    paths:
      - 'DesktopAutomationApp/DesktopAutomationApp.csproj'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "DesktopAutomationApp/DesktopAutomationApp.csproj"
          $version = $csproj.Project.PropertyGroup.Version | Select-Object -First 1
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Detected version: $version"

      - name: Check if release already exists
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.ver.outputs.TAG }}"
          $isManual = "${{ github.event_name }}" -eq "workflow_dispatch"

          $releases = gh release list --limit 100 --json tagName | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw "Failed to list GitHub releases." }
          $exists = $releases.tagName -contains $tag

          if ($isManual -and $exists) {
            Write-Host "Manual run: recreating $tag."
            gh release delete $tag --yes --cleanup-tag
            if ($LASTEXITCODE -ne 0) { throw "Failed to delete existing release/tag $tag" }
            $exists = $false
          }

          "EXISTS=$($exists.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        if: steps.check.outputs.EXISTS == 'false'
        run: dotnet restore DesktopAutomationApp/DesktopAutomationApp.csproj

      - name: Publish self-contained (win-x64)
        if: steps.check.outputs.EXISTS == 'false'
        run: >
          dotnet publish DesktopAutomationApp/DesktopAutomationApp.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o out/win-x64

      - name: Install Velopack CLI
        if: steps.check.outputs.EXISTS == 'false'
        run: dotnet tool install vpk --tool-path ./.tools --version 1.2.0

      - name: Download previous Velopack release
        if: steps.check.outputs.EXISTS == 'false'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./.tools/vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "$env:GITHUB_TOKEN" `
            --outputDir Releases

      - name: Build Velopack packages and installer
        if: steps.check.outputs.EXISTS == 'false'
        shell: pwsh
        run: |
          ./.tools/vpk pack `
            --packId "Fabius603.DesktopAutomation" `
            --packVersion "${{ steps.ver.outputs.VERSION }}" `
            --packDir "out/win-x64" `
            --mainExe "DesktopAutomationApp.exe" `
            --packTitle "DesktopAutomation" `
            --packAuthors "Fabius603" `
            --runtime "win-x64" `
            --icon "DesktopAutomationApp/Assets/App.ico" `
            --outputDir Releases

      - name: Upload draft GitHub release
        if: steps.check.outputs.EXISTS == 'false'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./.tools/vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "$env:GITHUB_TOKEN" `
            --outputDir Releases `
            --releaseName "DesktopAutomation ${{ steps.ver.outputs.VERSION }}" `
            --tag "${{ steps.ver.outputs.TAG }}"

      - name: Rename installer and publish release
        if: steps.check.outputs.EXISTS == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $originalName = "Fabius603.DesktopAutomation-win-Setup.exe"
          $installerName = "DesktopAutomation-Setup.exe"
          $portableName = "Fabius603.DesktopAutomation-win-Portable.zip"
          $installerPath = Join-Path "Releases" $installerName

          Copy-Item `
            -LiteralPath (Join-Path "Releases" $originalName) `
            -Destination $installerPath

          gh release upload "${{ steps.ver.outputs.TAG }}" $installerPath --clobber
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload renamed installer." }

          gh release delete-asset "${{ steps.ver.outputs.TAG }}" $originalName --yes
          if ($LASTEXITCODE -ne 0) { throw "Failed to remove original installer asset." }

          gh release delete-asset "${{ steps.ver.outputs.TAG }}" $portableName --yes
          if ($LASTEXITCODE -ne 0) { throw "Failed to remove portable release asset." }

          $releaseNotes = @"
          ## Installation

          Bitte ausschließlich **DesktopAutomation-Setup.exe** herunterladen und ausführen.

          Die übrigen Dateien sind technische Velopack-Dateien für automatische Updates
          und nicht für die manuelle Installation vorgesehen.
          "@

          gh release edit "${{ steps.ver.outputs.TAG }}" `
            --notes $releaseNotes `
            --draft=false `
            --latest
          if ($LASTEXITCODE -ne 0) { throw "Failed to publish release." }

      - name: Upload Velopack build artifacts
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: DesktopAutomation-${{ steps.ver.outputs.VERSION }}-win-x64
          path: Releases
